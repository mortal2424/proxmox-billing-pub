version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: proxmox-billing-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./webroot:/var/www/html:ro
      - ssl-certs:/etc/nginx/ssl
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - apache
    networks:
      - billing-network
    restart: unless-stopped

  apache:
    build:
      context: .
      dockerfile: Dockerfile.apache
    container_name: proxmox-billing-apache
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
      - ./backups:/var/www/html/backups
      - ./docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - billing-network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: proxmox-billing-db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - billing-network

volumes:
  db_data:
  ssl-certs:

networks:
  billing-network:
    driver: bridge