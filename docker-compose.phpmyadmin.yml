version: '3.8'

services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: proxmox-billing-phpmyadmin
    ports:
      - "8081:80"   # Если порт занят, измените на другой, например 8082
    environment:
      PMA_HOST: db                 # Имя сервиса БД в основном стеке
      PMA_PORT: 3306
      PMA_ARBITRARY: 1             # Позволяет вручную вводить адрес сервера
      UPLOAD_LIMIT: 100M
    networks:
      - billing-network             # Подключаемся к сети основного стека
    restart: unless-stopped

networks:
  billing-network:
    external: true                 # Используем существующую сеть, созданную основным стеком